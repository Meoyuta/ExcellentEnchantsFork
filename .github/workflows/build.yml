name: Build / 构建

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read / 只读内容

jobs:
  build:
    name: Build Plugin / 构建插件
    runs-on: ubuntu-latest / 运行环境：Ubuntu 最新版

    steps:
      - name: Checkout / 检出代码
        uses: actions/checkout@v4

      - name: Set up JDK 25 / 设置 JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: zulu / 发行版：Zulu
          java-version: '25' / Java 版本：25
          cache: maven / 缓存：Maven

      - name: Build with script / 使用脚本构建
        run: bash build.sh

      - name: Upload artifacts / 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: ExcellentEnchants-5.4.5
          if-no-files-found: error / 未找到文件时报错
          name: ExcellentEnchants-5.4.6
          if-no-files-found: error
          path: |
            target/ExcellentEnchants-*.jar
            Core/target/Core-*.jar
            build.log